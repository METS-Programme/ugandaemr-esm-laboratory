name: UgandaEMR CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types:
      - created

permissions:
  contents: read
  actions: write

env:
  ESM_NAME: "@ugandaemr/esm-laboratory-app"
  JS_NAME: "ugandaemr-esm-laboratory-app.js"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TURBO_API: "http://127.0.0.1:9080"
      TURBO_TOKEN: ${{ secrets.TURBO_SERVER_TOKEN }}
      TURBO_TEAM: ${{ github.repository_owner }}

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          registry-url: "https://registry.npmjs.org"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup local cache server for Turborepo
        uses: felixmosh/turborepo-gh-artifacts@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ secrets.TURBO_SERVER_TOKEN }}

      - name: Verify
        run: yarn verify

      - name: Build
        run: yarn turbo build --color --concurrency=5

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist

  pre_release:
    runs-on: ubuntu-latest
    needs: build

    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    env:
      TURBO_API: "http://127.0.0.1:9080"
      TURBO_TOKEN: ${{ secrets.TURBO_SERVER_TOKEN }}
      TURBO_TEAM: ${{ github.repository_owner }}
      NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          registry-url: "https://registry.npmjs.org"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup local cache server for Turborepo
        uses: felixmosh/turborepo-gh-artifacts@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ secrets.TURBO_SERVER_TOKEN }}

      - name: Create unique prerelease version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(node -e "const semver=require('semver'); console.log(semver.inc('$CURRENT_VERSION', 'patch'))")
          NEW_VERSION="${BASE_VERSION}-pre.${{ github.run_number }}"
          echo "Publishing prerelease version: ${NEW_VERSION}"
          yarn version "${NEW_VERSION}"

      - name: Build package
        run: yarn turbo build --color --concurrency=5

      - name: Configure npm auth
        run: yarn config set npmAuthToken "$NPM_AUTH_TOKEN"

      - name: Publish prerelease to npm
        run: yarn npm publish --access public --tag next

      - name: Upload prerelease artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-prerelease-${{ github.run_id }}
          path: dist
          overwrite: true

  release:
    runs-on: ubuntu-latest
    needs: build

    if: ${{ github.event_name == 'release' }}

    env:
      TURBO_API: "http://127.0.0.1:9080"
      TURBO_TOKEN: ${{ secrets.TURBO_SERVER_TOKEN }}
      TURBO_TEAM: ${{ github.repository_owner }}
      NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          registry-url: "https://registry.npmjs.org"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup local cache server for Turborepo
        uses: felixmosh/turborepo-gh-artifacts@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ secrets.TURBO_SERVER_TOKEN }}

      - name: Build package
        run: yarn turbo build --color --concurrency=5

      - name: Configure npm auth
        run: yarn config set npmAuthToken "$NPM_AUTH_TOKEN"

      - name: Publish release to npm
        run: yarn run ci:publish
