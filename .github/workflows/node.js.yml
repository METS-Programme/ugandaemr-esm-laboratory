name: UgandaEMR CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types:
      - created

env:
  ESM_NAME: "@ugandaemr/esm-laboratory-app"
  JS_NAME: "ugandaemr-esm-laboratory-app.js"
  TURBO_API: "http://127.0.0.1:9080"
  TURBO_TOKEN: "turbo-token"
  TURBO_TEAM: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🧭 Show workflow context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Run number: ${{ github.run_number }}"

      - name: 🟢 Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: 🧶 Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          node --version
          yarn --version

      - name: 💾 Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: 📦 Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: 🚀 Setup Turborepo cache
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ env.TURBO_TOKEN }}

      - name: ✅ Verify
        run: yarn verify

      - name: 🛠️ Build
        run: yarn turbo run build --color --concurrency=5

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          overwrite: true

  pre_release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4

      - name: 🧭 Confirm prerelease trigger
        run: |
          echo "This job should only run on push to main."
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Run number: ${{ github.run_number }}"

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: 🧶 Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          node --version
          yarn --version

      - name: 💾 Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: 📦 Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: 🚀 Setup Turborepo cache
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ env.TURBO_TOKEN }}

      - name: 🏷️ Version unique prerelease
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(node -e "const semver=require('semver'); console.log(semver.inc('$CURRENT_VERSION', 'patch'))")
          NEW_VERSION="${BASE_VERSION}-pre.${{ github.run_number }}"

          echo "Current version: ${CURRENT_VERSION}"
          echo "Base patch version: ${BASE_VERSION}"
          echo "New prerelease version: ${NEW_VERSION}"

          yarn version "${NEW_VERSION}"

          echo "package.json version after update:"
          node -p "require('./package.json').version"

      - name: 🛠️ Build
        run: yarn turbo run build --color --concurrency=5

      - name: 📦 Inspect package metadata
        run: |
          echo "Package name:"
          node -p "require('./package.json').name"

          echo "Package version:"
          node -p "require('./package.json').version"

          echo "Package private field:"
          node -p "require('./package.json').private"

          echo "Package publishConfig:"
          node -p "JSON.stringify(require('./package.json').publishConfig || {}, null, 2)"

          echo "Package files field:"
          node -p "JSON.stringify(require('./package.json').files || [], null, 2)"

      - name: ✅ Verify package contains dist JS
        run: |
          yarn pack --out package.tgz

          echo "Package tarball contents:"
          tar -tf package.tgz

          echo "Checking for built JS files in dist..."
          tar -tf package.tgz | grep -E '^package/dist/.+\.js$' || (echo "❌ dist js files missing from tarball" && exit 1)

          echo "✅ dist JS files found in tarball"

      - name: 🔐 Diagnose npm authentication
        run: |
          echo "Checking whether NPM_AUTH_TOKEN exists..."
          if [ -z "${NPM_AUTH_TOKEN}" ]; then
            echo "❌ NPM_AUTH_TOKEN is missing or empty"
            exit 1
          fi

          echo "✅ NPM_AUTH_TOKEN is present"

          echo "Setting npm auth token for Yarn..."
          yarn config set npmAuthToken "${NPM_AUTH_TOKEN}"

          echo "Checking npm identity..."
          yarn npm whoami

          echo "✅ npm authentication succeeded"
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: 🔎 Check npm package and version safely
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Package to publish: ${PACKAGE_NAME}@${PACKAGE_VERSION}"

          echo "Current npm package info:"
          yarn npm info "${PACKAGE_NAME}" --json || true

          echo "Checking whether this exact version already exists..."
          EXISTING_VERSIONS=$(yarn npm info "${PACKAGE_NAME}" versions --json | node -e "
            let input = '';
            process.stdin.on('data', chunk => input += chunk);
            process.stdin.on('end', () => {
              try {
                const data = JSON.parse(input);
                const versions = Array.isArray(data) ? data : data.versions || [];
                console.log(versions.join('\n'));
              } catch (e) {
                console.error('Could not parse npm versions response');
                console.error(input);
                process.exit(1);
              }
            });
          ")

          echo "Existing versions:"
          echo "${EXISTING_VERSIONS}"

          if echo "${EXISTING_VERSIONS}" | grep -Fxq "${PACKAGE_VERSION}"; then
            echo "❌ Version already exists on npm: ${PACKAGE_NAME}@${PACKAGE_VERSION}"
            echo "npm versions are immutable. Increase the version or use a different prerelease number."
            exit 1
          fi

          echo "✅ Version does not exist yet. Safe to publish."

      - name: 🚢 Publish prerelease to npm next tag
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION} with npm tag: next"

          yarn config set npmAuthToken "${NPM_AUTH_TOKEN}"
          yarn npm publish --access public --tag next

          echo "✅ Publish command completed"

          echo "Checking npm dist-tags after publish:"
          yarn npm info "${PACKAGE_NAME}" dist-tags --json || true
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: 🧹 Cleanup
        if: always()
        run: rm -f package.tgz

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          overwrite: true

  release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'release' }}

    steps:
      - uses: actions/checkout@v4

      - name: 🧭 Confirm release trigger
        run: |
          echo "This job should only run when a GitHub Release is created."
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Release tag: ${{ github.event.release.tag_name }}"
          echo "Repository: ${{ github.repository }}"

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v4

      - name: 🟢 Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: 🧶 Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          node --version
          yarn --version

      - name: 💾 Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: 📦 Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: 🛠️ Build
        run: yarn turbo run build --color

      - name: 📦 Inspect package metadata
        run: |
          echo "Package name:"
          node -p "require('./package.json').name"

          echo "Package version:"
          node -p "require('./package.json').version"

          echo "Package private field:"
          node -p "require('./package.json').private"

          echo "Package publishConfig:"
          node -p "JSON.stringify(require('./package.json').publishConfig || {}, null, 2)"

          echo "Package files field:"
          node -p "JSON.stringify(require('./package.json').files || [], null, 2)"

      - name: ✅ Verify package contains dist JS
        run: |
          yarn pack --out package.tgz

          echo "Package tarball contents:"
          tar -tf package.tgz

          echo "Checking for built JS files in dist..."
          tar -tf package.tgz | grep -E '^package/dist/.+\.js$' || (echo "❌ dist js files missing from tarball" && exit 1)

          echo "✅ dist JS files found in tarball"

      - name: 🔐 Diagnose npm authentication
        run: |
          echo "Checking whether NPM_AUTH_TOKEN exists..."
          if [ -z "${NPM_AUTH_TOKEN}" ]; then
            echo "❌ NPM_AUTH_TOKEN is missing or empty"
            exit 1
          fi

          echo "✅ NPM_AUTH_TOKEN is present"

          echo "Setting npm auth token for Yarn..."
          yarn config set npmAuthToken "${NPM_AUTH_TOKEN}"

          echo "Checking npm identity..."
          yarn npm whoami

          echo "✅ npm authentication succeeded"
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: 🔎 Check npm package and version safely
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Package to publish: ${PACKAGE_NAME}@${PACKAGE_VERSION}"

          echo "Current npm package info:"
          yarn npm info "${PACKAGE_NAME}" --json || true

          echo "Checking whether this exact version already exists..."
          EXISTING_VERSIONS=$(yarn npm info "${PACKAGE_NAME}" versions --json | node -e "
            let input = '';
            process.stdin.on('data', chunk => input += chunk);
            process.stdin.on('end', () => {
              try {
                const data = JSON.parse(input);
                const versions = Array.isArray(data) ? data : data.versions || [];
                console.log(versions.join('\n'));
              } catch (e) {
                console.error('Could not parse npm versions response');
                console.error(input);
                process.exit(1);
              }
            });
          ")

          echo "Existing versions:"
          echo "${EXISTING_VERSIONS}"

          if echo "${EXISTING_VERSIONS}" | grep -Fxq "${PACKAGE_VERSION}"; then
            echo "❌ Version already exists on npm: ${PACKAGE_NAME}@${PACKAGE_VERSION}"
            echo "npm versions are immutable. Increase the version before creating the GitHub Release."
            exit 1
          fi

          echo "✅ Version does not exist yet. Safe to publish."

      - name: 🚢 Publish release to npm latest tag
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION} with npm default/latest tag"

          yarn config set npmAuthToken "${NPM_AUTH_TOKEN}"
          yarn npm publish --access public

          echo "✅ Publish command completed"

          echo "Checking npm dist-tags after publish:"
          yarn npm info "${PACKAGE_NAME}" dist-tags --json || true
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: 🧹 Cleanup
        if: always()
        run: rm -f package.tgz
