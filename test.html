<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab App Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Laboratory App Debug Test</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            results.appendChild(div);
        }

        log('Starting debug test...', 'info');

        // Test if we can load the main app file
        log('Testing main app file load...', 'info');
        const script = document.createElement('script');
        script.src = 'http://localhost:2001/ugandaemr-esm-laboratory-app.js';
        script.onload = () => log('✓ Main app file loaded successfully!', 'success');
        script.onerror = () => log('✗ Failed to load main app file', 'error');
        document.head.appendChild(script);

        // Check for browser console errors
        window.addEventListener('error', (e) => {
            log(`Browser Error: ${e.message} at ${e.filename}:${e.lineno}`, 'error');
        });

        // Check for unhandled promise rejections
        window.addEventListener('unhandledrejection', (e) => {
            log(`Promise Error: ${e.reason}`, 'error');
        });

        // Try to access the OpenMRS SPA
        setTimeout(() => {
            log('Attempting to access OpenMRS SPA...', 'info');
            fetch('http://localhost:2001/openmrs/spa/home/laboratory')
                .then(response => {
                    if (response.ok) {
                        log(`✓ SPA accessible (Status: ${response.status})`, 'success');
                    } else {
                        log(`✗ SPA returned status: ${response.status}`, 'error');
                    }
                })
                .catch(error => log(`✗ Network error: ${error.message}`, 'error'));
        }, 2000);

        log('<strong>Instructions:</strong>', 'info');
        log('1. Open Chrome DevTools (F12) and go to Console tab', 'info');
        log('2. Look for any red errors and copy them here', 'info');
        log('3. Check the Network tab for any failed file loads', 'info');
    </script>
</body>
</html>
